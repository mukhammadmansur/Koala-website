<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koala Website</title>
    <link rel="stylesheet" href="styles/style.css">
    <!-- <link rel="stylesheet" href="styles/main.css"> -->

    <script src="https://kit.fontawesome.com/6a153a4732.js" crossorigin="anonymous"></script>
</head>
<body>
<main class="main">
    <header class="header__container container">
        <a class="header__logo" href="#">Koala<span>.</span></a>
        <ul class="header__nav">
            <li><a class="list-item" href="#">Home</a></li>
            <li><a class="list-item" href="#">Gallery</a></li>
            <li><a class="list-item" href="#">Blog</a></li>
            <li><a class="list-item" href="#">Knet</a></li>
        </ul>
    </header>

    <section class="hero__container container">
        <div class="hero_info">
            <h1 class="hero-title">Koala <span>Intelligence</span> Agency</h1>
            <p class="hero-text">A collection of 10,000 worldly Koalas each with their unique skillsets. Their mission is to protect the world from evil.</p>
            <img class="hero-info-end" src="images/round-text.svg" alt="">
        </div>

        <div class="hero__right">
            <img src="images/koala.svg" alt="">
            <ul class="social-links">
                <li class="link-items" title="Twitter"><a href="#"><i class="fa-brands fa-x-twitter"></i></a></li>
                <li class="link-items" title="Reddit"><a href="#"><i class="fa-brands fa-reddit-alien"></i></a></li>
                <li class="link-items" title="Instagram"><a href="#"><i class="fa-brands fa-instagram"></i></a></li>
                <li class="link-items" title="Facebook"><a href="#"><i class="fa-brands fa-facebook-f"></i></a></li>
                <li class="link-items" title="TikTok"><a href="#"><i class="fa-brands fa-tiktok"></i></a></li>
            </ul>
        </div>
    </section>     
</main>
</body>
</html>
